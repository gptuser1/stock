name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install --legacy-peer-deps

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Set D1_API_TOKEN secret
        run: echo "${{ secrets.D1_API_TOKEN }}" | npx wrangler secret put D1_API_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Set API endpoint secrets
        run: |
          [ -n "${{ secrets.TENCENT_API_BASE }}" ] && echo "${{ secrets.TENCENT_API_BASE }}" | npx wrangler secret put TENCENT_API_BASE || echo "TENCENT_API_BASE not set, using default"
          [ -n "${{ secrets.YAHOO_API_BASE }}" ] && echo "${{ secrets.YAHOO_API_BASE }}" | npx wrangler secret put YAHOO_API_BASE || echo "YAHOO_API_BASE not set, using default"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}